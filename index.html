            "Explica cómo funciona una nave espacial usando solo palabras que un niño de 5 años entendería.",
            "Mantén un concurso de miradas dramático con uno de los perros; si el perro aparta la vista primero, come una galleta.",
            "Toca un instrumento musical acompañando un breakdown imaginario con cara de máxima concentración y excitación.",
            "Habla como un detective del siglo XIX, como resolviendo un misterio, durante toda la siguiente ronda.",
            "Haz una lectura dramática e intensa de 30 segundos de las condiciones de un servicio o un manual.",
            "Finge ser una cámara de seguridad que funciona mal mientras escaneas robóticamente el salón con la cabeza.",
            "Nombra 5 grupos de música o 5 autores de libros del género favorito del ganador de la ronda anterior en 10 segundos.",
            "Intenta tocarte la nariz con la lengua mientras mantienes contacto visual conmigo, fijo, y sin reírte.",
            "Elogia la caligrafía del ganador de una manera exageradamente y poética.",
            "Actúa como el asistente personal del ganador durante los próximos 5 minutos.",
            "Sostén un boli haciendo equilibrio sobre tu cabeza mientras explicas tu siguiente respuesta en la siguiente ronda.",
            "Describe tu película favorita usando puntos de la trama que sean completamente falsos y absurdos.",
            "Haz tu mejor imitación de la otra persona cuando está muy concentrada intentando resolver un problema difícil.",
            "Canta la siguiente respuesta que des como si fuera una ópera trágica.",
            "Inventa una nueva tradición de un pueblo de Salamanca o Puigcerdà completamente falsa y explícala de forma súper convincente.",
            "Habla con un acento francés terrible y exagerado durante toda la duración de la siguiente ronda.",
            "Narra tus propias acciones en voz alta como si fueras un comentarista deportivo de élite durante 2 minutos.",
            "Tienes que referirte al ganador como 'Su Majestad' durante las próximas 3 rondas.",
            "Da una micro charla TED de 1 minuto sobre por qué la mayonesa de Sriracha es superior a todas las demás salsas del universo.",
            "Finge que el suelo es lava: si te tienes que levantar durante el próximo minuto, solo puedes tocar el suelo con un pie dando saltos.",
            "Pídele disculpas profusamente y con mucha pena a un mueble del salón por haberlo mirado mal.",
            "Inventa y presenta el argumento de un crossover épico entre la banda Sleep Token y un libro de Juán Gomez-Jurado.",
            "Actúa como un extraterrestre que acaba de aterrizar en la Tierra y está probando comida a domicilio por primera vez en su vida.",
            "Dale a la otra persona una ovación de pie altamente exagerada y emotiva durante 20 segundos seguidos.",
            "Inventa un sonido nuevo y ridículo para notificaciones de móvil y reprodúcelo con la boca cada vez que el ganador termine de hablar en la siguiente ronda."
        ];

        const themes = [
            { name: "Deep Space", bg: "#050510", text: "#00ffff", g1: "#0044ff", g2: "#ff00dd" },
            { name: "Synthwave", bg: "#1a0b2e", text: "#ff007f", g1: "#ff9900", g2: "#ff007f" },
            { name: "Amber Alert", bg: "#141414", text: "#ffaa00", g1: "#ff5500", g2: "#cc0000" },
            { name: "Cyberpunk", bg: "#0d1b2a", text: "#00ffcc", g1: "#00ffcc", g2: "#0066ff" },
            { name: "Crimson Void", bg: "#2a0808", text: "#ffcccc", g1: "#ff0000", g2: "#660000" },
            { name: "Neon Mint", bg: "#0a241e", text: "#00ff99", g1: "#00ff99", g2: "#0099cc" },
            { name: "Solar Flare", bg: "#2b1304", text: "#ffcc00", g1: "#ffcc00", g2: "#ff3300" },
            { name: "Abyssal Blue", bg: "#020b1f", text: "#99ccff", g1: "#3366ff", g2: "#9900ff" }
        ];

        // --- STATE MANAGEMENT ---
        let activeQuestions = JSON.parse(localStorage.getItem('psFiles_questions')) || [...masterQuestions];
        let activePunishments = JSON.parse(localStorage.getItem('psFiles_punishments')) || [...masterPunishments];
        let isSpinning = false;
        
        // Pick a random theme on startup
        let currentThemeIndex = Math.floor(Math.random() * themes.length);

        function updateCounter() {
            if (activeQuestions.length === 0) activeQuestions = [...masterQuestions];
            if (activePunishments.length === 0) activePunishments = [...masterPunishments];
            
            localStorage.setItem('psFiles_questions', JSON.stringify(activeQuestions));
            localStorage.setItem('psFiles_punishments', JSON.stringify(activePunishments));
            
            document.getElementById('counter').innerText = `Archivos restantes: ${activeQuestions.length} / Castigos: ${activePunishments.length}`;
        }
        updateCounter();

        // --- WEB AUDIO API (Synthesized Sounds, Max 15% Vol) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBlip() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(400 + Math.random() * 400, audioCtx.currentTime);
            // Lowered blip volume
            gain.gain.setValueAtTime(0.015, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playImpact() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.5);
            // Max volume capped at 15%
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        function playWildcard() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
            osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.5);
            // Max volume capped at 15%
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        // --- GAME LOGIC ---
        function applyTheme(index) {
            const t = themes[index];
            document.documentElement.style.setProperty('--bg-color', t.bg);
            document.documentElement.style.setProperty('--text-color', t.text);
            document.documentElement.style.setProperty('--btn-grad1', t.g1);
            document.documentElement.style.setProperty('--btn-grad2', t.g2);
        }
        
        // Apply initial theme on load
        applyTheme(currentThemeIndex);

        function spin(type) {
            if (isSpinning) return;
            initAudio();
            isSpinning = true;

            const textEl = document.getElementById('output-text');
            const btnChoose = document.getElementById('btn-choose');
            const btnPunish = document.getElementById('btn-punishment');
            const sourceArray = type === 'question' ? activeQuestions : activePunishments;
            
            // UI States
            textEl.classList.remove('wildcard');
            btnChoose.classList.add('btn-hidden');
            btnPunish.classList.add('btn-hidden');
            textEl.classList.add('blur-spin');

            let ticks = 0;
            const maxTicks = 25; // Spin duration
            const tempArray = type === 'question' ? masterQuestions : masterPunishments;

            const spinInterval = setInterval(() => {
                playBlip();
                textEl.innerText = tempArray[Math.floor(Math.random() * tempArray.length)];
                ticks++;

                if (ticks >= maxTicks) {
                    clearInterval(spinInterval);
                    finalizeSpin(type, sourceArray, textEl, btnChoose, btnPunish);
                }
            }, 80);
        }

        function finalizeSpin(type, array, textEl, btnChoose, btnPunish) {
            // Pick and remove final item
            const randomIndex = Math.floor(Math.random() * array.length);
            const finalResult = array.splice(randomIndex, 1)[0];
            updateCounter();

            // Check Wildcard (5% chance only on questions)
            const isWildcard = type === 'question' && Math.random() < 0.05;

            textEl.classList.remove('blur-spin');
            
            if (isWildcard) {
                textEl.innerText = "🚨 ¡EVENTO CRÍTICO! 🚨\n\n" + finalResult + "\n\n(El perdedor de esta ronda cumple castigo automáticamente)";
                textEl.classList.add('wildcard');
                playWildcard();
            } else {
                textEl.innerText = finalResult;
                playImpact();
            }

            // Bring buttons back
            setTimeout(() => {
                btnChoose.classList.remove('btn-hidden');
                btnPunish.classList.remove('btn-hidden');
                isSpinning = false;
            }, 800);
        }

        function resetGame() {
            if(confirm("¿Estás seguro de que quieres formatear la base de datos y empezar de cero?")) {
                localStorage.removeItem('psFiles_questions');
                localStorage.removeItem('psFiles_punishments');
                activeQuestions = [...masterQuestions];
                activePunishments = [...masterPunishments];
                updateCounter();
                
                const textEl = document.getElementById('output-text');
                textEl.classList.remove('wildcard');
                textEl.innerHTML = "SISTEMA RESTAURADO.<br>Base de datos lista.";
            }
        }

        function cycleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            applyTheme(currentThemeIndex);
        }

        // --- EVENT LISTENERS ---
        document.getElementById('btn-choose').addEventListener('click', () => spin('question'));
        document.getElementById('btn-punishment').addEventListener('click', () => spin('punishment'));
        document.getElementById('btn-reset').addEventListener('click', resetGame);
        document.getElementById('btn-theme').addEventListener('click', cycleTheme);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isSpinning) {
                e.preventDefault();
                spin('question');
            }
            if (e.code === 'Enter' && !isSpinning) {
                e.preventDefault();
                spin('punishment');
            }
        });
    </script>
</body>
</html>
